# A player must be listed here, be OP, and have commandcontrol.use to use /cmdctl.
# UUID is preferred. Name is accepted for local testing and first-time setup.
authorized-players:
  - uuid: "00000000-0000-0000-0000-000000000000"
    name: "ExamplePlayer"

# A player must be listed here, be OP, and have commandcontrol.shell to use /cmdctlsh.
# Shell commands run as the Linux user that owns the Minecraft server process.
shell-authorized-players: []

shell:
  executable: "/bin/sh"
  working-directory: "."
  timeout-seconds: 10
  max-output-lines: 80
  # auto disables Dialog UI when known packet-inspection plugins cannot map new Dialog packets.
  # Use enabled to force Dialog UI, or disabled to always use chat output.
  dialog-mode: "auto"
